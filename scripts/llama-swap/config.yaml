healthCheckTimeout: 300
logLevel: info

models:
  "llamacpp/gemma4-26b":
    cmd: |
      llama-server \
      --hf-repo unsloth/gemma-4-26B-A4B-it-GGUF \
      --hf-file gemma-4-26B-A4B-it-UD-Q4_K_M.gguf \
      --port ${PORT} \
      --ctx-size 131072 \
      -ngl 99 -fa on --jinja \
      -np 1 -ctk q8_0 -ctv q8_0
    concurrencyLimit: 8
  
  "vllm/qwen3.6-35b":
    cmd: |
      docker run --rm \
      --name vllm-qwen3.6-35b \
      --gpus all \
      -p ${PORT}:${PORT} \
      --shm-size 16G \
      -e HF_TOKEN=${env.HF_TOKEN} \
      -e VLLM_SLEEP_WHEN_IDLE=1 \
      -e VLLM_USE_DEEP_GEMM=0 \
      -e VLLM_USE_FLASHINFER_MOE_FP16=1 \
      -e VLLM_USE_FLASHINFER_SAMPLER=0 \
      -e OMP_NUM_THREADS=4 \
      -v ${env.HOME}/.cache/huggingface:/root/.cache/huggingface \
      --entrypoint bash \
      vllm/vllm-openai:cu130-nightly \
      -c "pip install -q pandas && exec vllm serve QuantTrio/Qwen3.6-35B-A3B-AWQ --served-model-name vllm/qwen3.6-35b --max-num-seqs 4 --max-model-len 100000 --gpu-memory-utilization 0.92 --tensor-parallel-size 1 --enable-auto-tool-choice --tool-call-parser qwen3_coder --reasoning-parser qwen3 --speculative-config '{\"method\":\"qwen3_next_mtp\",\"num_speculative_tokens\":2}' --host 0.0.0.0 --port ${PORT}"
    cmdStop: |
      docker stop vllm-qwen3.6-35b || true
    concurrencyLimit: 32
