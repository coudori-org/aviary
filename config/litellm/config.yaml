general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"

litellm_settings:
  drop_params: true
  request_timeout: 120
  num_retries: 0

router_settings:
  enable_pre_call_checks: true
  default_litellm_params:
    max_tokens: 8000
