model_list:
  # --- Anthropic (Claude) ---
  - model_name: "anthropic/claude-sonnet-4-6"
    litellm_params:
      model: "anthropic/claude-sonnet-4-6"
      api_key: "os.environ/ANTHROPIC_API_KEY"

  - model_name: "anthropic/claude-opus-4-6"
    litellm_params:
      model: "anthropic/claude-opus-4-6"
      api_key: "os.environ/ANTHROPIC_API_KEY"

  # --- Ollama ---
  - model_name: "ollama/gemma4:26b"
    litellm_params:
      model: "ollama/gemma4:26b"
      api_base: "http://host.docker.internal:11434"

  # --- vLLM ---
  - model_name: "hosted_vllm/cyankiwi/gemma-4-31B-it-AWQ-4bit"
    litellm_params:
      model: "hosted_vllm/cyankiwi/gemma-4-31B-it-AWQ-4bit"
      api_base: "http://host.docker.internal:8191"

  # --- Bedrock ---
  - model_name: "bedrock/anthropic.claude-sonnet-4-5-20250929-v1:0"
    litellm_params:
      model: "bedrock/anthropic.claude-sonnet-4-5-20250929-v1:0"
      aws_region_name: "ap-northeast-2"

general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"

litellm_settings:
  drop_params: true
  request_timeout: 120
  num_retries: 0
