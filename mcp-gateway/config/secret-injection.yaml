# Secret injection mappings.
#
# Defines which tool arguments should be injected from Vault.
# Injected arguments are hidden from Claude and filled by the Gateway.
#
# Vault path: secret/aviary/credentials/{user_external_id}/{vault_key}
#
# Two levels:
#
#   servers.<name>.args    Applies to ALL tools on that server.
#                          Any tool parameter matching the arg name gets injected.
#
#   servers.<name>.tools.<tool>.args
#                          Per-tool override. Merges with (and overrides) server-level.

servers:
  jira:
    args:
      jira_token:
        vault_key: jira-token

  confluence:
    args:
      confluence_token:
        vault_key: confluence-token

  # Per-tool override example:
  # jira:
  #   args:
  #     jira_token:
  #       vault_key: jira-token
  #   tools:
  #     some_special_tool:
  #       args:
  #         jira_token:
  #           vault_key: jira-readonly-token
  #         extra_secret:
  #           vault_key: another-key
