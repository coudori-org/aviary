# Per-user MCP secret injection mappings consumed by the LiteLLM guardrail
# in `config/litellm/patches/aviary_mcp_credentials.py` (path configured
# via the `AVIARY_MCP_INJECTION_CONFIG` env var on the litellm container).
#
# Injected args are filled from Vault on `tools/call` and stripped from the
# schema the model sees at MCP server registration time.
#
# Vault path: secret/aviary/credentials/{user_external_id}/{server_name}/{vault_key}
# (the server name from this file's top key becomes the Vault namespace —
# so two servers can use the same vault_key without colliding)
#
# Two levels:
#
#   servers.<name>.args    Applies to ALL tools on that server.
#                          Any tool parameter matching the arg name gets injected.
#
#   servers.<name>.tools.<tool>.args
#                          Per-tool override. Merges with (and overrides) server-level.

servers:
  jira:
    args:
      jira_token:
        vault_key: jira-token

  confluence:
    args:
      confluence_token:
        vault_key: confluence-token

  # Per-tool override example:
  # jira:
  #   args:
  #     jira_token:
  #       vault_key: jira-token
  #   tools:
  #     some_special_tool:
  #       args:
  #         jira_token:
  #           vault_key: jira-readonly-token
  #         extra_secret:
  #           vault_key: another-key
