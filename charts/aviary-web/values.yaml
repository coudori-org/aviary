namespace: platform

replicas: 1

# INTERNAL_API_URL is baked at build time. Browser-side URLs come from
# window.location at runtime, so the same image works behind any edge proxy.
image:
  repository: aviary-web
  tag: k8s-local
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000
  nodePort: 31301

config:
  internalAPIURL: "http://aviary-api.platform.svc.cluster.local:8000"

resources:
  requests: { cpu: 100m, memory: 256Mi }
  limits:   { cpu: 1,    memory: 1Gi }

livenessProbe:
  httpGet: { path: /, port: 3000 }
  initialDelaySeconds: 15
  periodSeconds: 30
readinessProbe:
  httpGet: { path: /, port: 3000 }
  initialDelaySeconds: 5
  periodSeconds: 10
