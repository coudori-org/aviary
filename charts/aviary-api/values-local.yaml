image:
  pullPolicy: Never

service:
  type: NodePort
  nodePort: 31000

config:
  oidcIssuer: "http://localhost:8080/realms/aviary"
  oidcInternalIssuer: "http://host.k8s.internal:8080/realms/aviary"
  oidcClientID: "aviary-web"
  llmGatewayURL: "http://litellm.platform.svc.cluster.local:4000"
  mcpGatewayURL: "http://litellm.platform.svc.cluster.local:4000"
  vaultAddr: "http://vault.platform.svc.cluster.local:8200"
  cookieSecure: "false"
  # The Caddy proxy entry on :80 is the only origin the browser ever uses.
  corsOrigins: '["http://localhost"]'

secrets:
  llmGatewayAPIKey: "sk-aviary-dev"
  mcpGatewayAPIKey: "sk-aviary-dev"
  vaultToken: "dev-root-token"
