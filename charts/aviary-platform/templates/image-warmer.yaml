{{- if .Values.imageWarmer.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: image-warmer
  namespace: {{ include "aviary-platform.platformNamespace" . }}
  labels:
    aviary/service: image-warmer
spec:
  selector:
    matchLabels:
      aviary/service: image-warmer
  template:
    metadata:
      labels:
        aviary/service: image-warmer
    spec:
      initContainers:
        - name: warm-runtime-image
          image: {{ .Values.imageWarmer.image }}
          imagePullPolicy: Never
          command: ["echo", "Image cached on node"]
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
          resources:
            requests: { cpu: "1m", memory: "4Mi" }
            limits:   { cpu: "1m", memory: "4Mi" }
{{- end }}
