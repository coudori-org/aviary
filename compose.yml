name: aviary

services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
      args:
        UV_INDEX_URL: ${UV_INDEX_URL:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://aviary:aviary@host.docker.internal:5432/aviary}
      REDIS_URL: ${REDIS_URL:-redis://host.docker.internal:6379/0}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_INTERNAL_ISSUER: ${OIDC_INTERNAL_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      DEV_USER_SUB: ${DEV_USER_SUB:-dev-user}
      SUPERVISOR_URL: ${SUPERVISOR_URL:-http://supervisor:9000}
      LLM_GATEWAY_URL: ${LLM_GATEWAY_URL:-}
      LLM_GATEWAY_API_KEY: ${LLM_GATEWAY_API_KEY:-}
      MCP_GATEWAY_URL: ${MCP_GATEWAY_URL:-}
      MCP_GATEWAY_API_KEY: ${MCP_GATEWAY_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000"]}
      TEMPORAL_HOST: ${TEMPORAL_HOST:-host.docker.internal:7233}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-aviary-workflows}
      VAULT_ADDR: ${VAULT_ADDR-}
      VAULT_TOKEN: ${VAULT_TOKEN-}
    volumes:
      - ./config.yaml:/workspace/config.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  admin:
    build:
      context: .
      dockerfile: admin/Dockerfile
      args:
        UV_INDEX_URL: ${UV_INDEX_URL:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://aviary:aviary@host.docker.internal:5432/aviary}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  supervisor:
    build:
      context: .
      dockerfile: agent-supervisor/Dockerfile
      args:
        UV_INDEX_URL: ${UV_INDEX_URL:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      REDIS_URL: ${REDIS_URL:-redis://host.docker.internal:6379/0}
      DEFAULT_RUNTIME_ENDPOINT: ${DEFAULT_RUNTIME_ENDPOINT:-http://runtime:3000}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_INTERNAL_ISSUER: ${OIDC_INTERNAL_ISSUER:-}
      DEV_USER_SUB: ${DEV_USER_SUB:-dev-user}
      VAULT_ADDR: ${VAULT_ADDR-}
      VAULT_TOKEN: ${VAULT_TOKEN-}
      WORKER_SHARED_SECRET: ${WORKER_SHARED_SECRET:-dev-worker-secret-change-me}
      LLM_GATEWAY_URL: ${LLM_GATEWAY_URL:-}
    volumes:
      - ./config.yaml:/workspace/config.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  workflow-worker:
    build:
      context: .
      dockerfile: workflow-worker/Dockerfile
      args:
        UV_INDEX_URL: ${UV_INDEX_URL:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TEMPORAL_HOST: ${TEMPORAL_HOST:-host.docker.internal:7233}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-aviary-workflows}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://aviary:aviary@host.docker.internal:5432/aviary}
      REDIS_URL: ${REDIS_URL:-redis://host.docker.internal:6379/0}
      SUPERVISOR_URL: ${SUPERVISOR_URL:-http://supervisor:9000}
      WORKER_SHARED_SECRET: ${WORKER_SHARED_SECRET:-dev-worker-secret-change-me}

  runtime:
    build:
      context: ./runtime
      args:
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    privileged: true
    environment:
      PORT: "3000"
      LLM_GATEWAY_URL: ${LLM_GATEWAY_URL:-}
      LLM_GATEWAY_API_KEY: ${LLM_GATEWAY_API_KEY:-}
      MCP_GATEWAY_URL: ${MCP_GATEWAY_URL:-}
      MCP_GATEWAY_API_KEY: ${MCP_GATEWAY_API_KEY:-}
      AVIARY_API_URL: http://api:8000/api
      AVIARY_SUPERVISOR_URL: http://supervisor:9000
    volumes:
      - runtime-workspace:/workspace-root
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: ./web
      target: runner
      args:
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-}
        INTERNAL_API_URL: ${INTERNAL_API_URL:-http://api:8000}
    environment:
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://api:8000}
      HOSTNAME: "0.0.0.0"
    depends_on:
      api:
        condition: service_healthy

  proxy:
    image: caddy:2-alpine
    ports:
      - "${PROXY_PORT:-3000}:80"
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started

volumes:
  runtime-workspace:
