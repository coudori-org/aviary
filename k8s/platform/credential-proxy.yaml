apiVersion: apps/v1
kind: Deployment
metadata:
  name: credential-proxy
  namespace: platform
  labels:
    agentbox/service: credential-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      agentbox/service: credential-proxy
  template:
    metadata:
      labels:
        agentbox/service: credential-proxy
    spec:
      containers:
        - name: credential-proxy
          image: agentbox-credential-proxy:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: VAULT_ADDR
              value: "http://vault.platform.svc:8200"
            - name: VAULT_TOKEN
              value: "dev-root-token"
            - name: DATABASE_URL
              value: "postgresql://agentbox:agentbox@postgres.platform.svc:5432/agentbox"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: credential-proxy
  namespace: platform
  labels:
    agentbox/service: credential-proxy
spec:
  selector:
    agentbox/service: credential-proxy
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
