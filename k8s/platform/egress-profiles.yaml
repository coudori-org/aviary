# Extra egress profiles — AWS Security Group equivalents for the K3S backend.
#
# Each data key `{profile}.json` is a JSON array of NetworkPolicy egress rule
# fragments. ServiceAccounts reference these by name; when an agent binds to
# a ServiceAccount, the supervisor merges all referenced profiles into a
# per-agent NetworkPolicy that unions on top of the namespace baseline
# (see default-egress.yaml).
#
# This ConfigMap holds ONLY extra profiles — baseline egress lives in a
# separate NetworkPolicy and is always enforced without binding.
#
# ${HOST_GATEWAY_IP} is substituted by setup-dev.sh at apply time.

apiVersion: v1
kind: ConfigMap
metadata:
  name: egress-profiles
  namespace: platform
  labels:
    aviary/service: egress-profiles
data:
  # Example: github.com public IP range.
  github.json: |
    [
      {
        "to": [{"ipBlock": {"cidr": "140.82.112.0/20"}}],
        "ports": [{"port": 443, "protocol": "TCP"}]
      }
    ]
  # Open the entire public internet. Use sparingly — usually only for
  # agents that need arbitrary outbound HTTP(S) (web browsing, unrestricted
  # package installs, etc.).
  allowall-sg.json: |
    [
      {
        "to": [{"ipBlock": {"cidr": "0.0.0.0/0"}}]
      }
    ]