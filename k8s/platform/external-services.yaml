# Proxy services for platform components running outside K8s (docker compose).
# These create K8s Service + Endpoints that map internal DNS names to the
# docker host IP, so agent pods can use standard K8s DNS (e.g.,
# litellm.platform.svc:4000) and existing NetworkPolicy rules
# (allow platform namespace) apply without any IP-based exceptions.
#
# The Endpoints IP must match the host gateway IP (HOST_GATEWAY_IP env var).
# setup-dev.sh patches this automatically.

---
# LiteLLM — LLM gateway
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: platform
  labels:
    aviary/service: litellm
spec:
  ports:
    - port: 4000
      targetPort: 8090
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: litellm
  namespace: platform
subsets:
  - addresses:
      - ip: "${HOST_GATEWAY_IP}"
    ports:
      - port: 8090
        protocol: TCP
