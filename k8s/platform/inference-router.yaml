apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-router
  namespace: platform
  labels:
    aviary/service: inference-router
spec:
  replicas: 1
  selector:
    matchLabels:
      aviary/service: inference-router
  template:
    metadata:
      labels:
        aviary/service: inference-router
    spec:
      hostAliases:
        - ip: "172.18.0.1"
          hostnames: ["host.k3s.internal"]
      containers:
        - name: inference-router
          image: aviary-inference-router:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: OLLAMA_URL
              value: "http://host.k3s.internal:11434"
            - name: VLLM_URL
              value: "http://host.k3s.internal:8001"
            - name: CLAUDE_API_URL
              value: "https://api.anthropic.com"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: inference-secrets
                  key: anthropic-api-key
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: inference-router
  namespace: platform
  labels:
    aviary/service: inference-router
spec:
  selector:
    aviary/service: inference-router
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
