# Baseline egress policy — always applied to every agent runtime pod.
#
# Matches the AWS "default VPC SG" model: a namespace-wide allow-list
# enforced on every agent regardless of its ServiceAccount binding.
# Per-agent ServiceAccount bindings add further NetworkPolicies that
# union on top of this (K8s evaluates egress as a disjunction).
#
# ${HOST_GATEWAY_IP} is substituted by setup-dev.sh at apply time.

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: baseline-egress
  namespace: agents
  labels:
    aviary/service: baseline-egress
spec:
  podSelector:
    matchLabels:
      aviary/role: agent-runtime
  policyTypes: ["Egress", "Ingress"]
  ingress:
    # Allow all ingress — egress is the enforcement boundary; ingress
    # to agent pods comes only from supervisor (in-cluster Service proxy).
    - {}
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - { port: 53, protocol: UDP }
    - to:
        - namespaceSelector:
            matchLabels:
              aviary/namespace: platform
      ports:
        - { port: 8080, protocol: TCP }
    - to:
        - ipBlock:
            cidr: ${HOST_GATEWAY_IP}/32
      ports:
        - { port: 8000, protocol: TCP }   # API
        - { port: 8090, protocol: TCP }   # LiteLLM
        - { port: 8100, protocol: TCP }   # MCP Gateway
