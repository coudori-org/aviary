apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: image-warmer
  namespace: platform
  labels:
    agentbox/service: image-warmer
spec:
  selector:
    matchLabels:
      agentbox/service: image-warmer
  template:
    metadata:
      labels:
        agentbox/service: image-warmer
    spec:
      initContainers:
        - name: warm-runtime-image
          image: agentbox-runtime:latest
          imagePullPolicy: Never
          command: ["echo", "Image cached on node"]
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
          resources:
            requests:
              cpu: "1m"
              memory: "4Mi"
            limits:
              cpu: "1m"
              memory: "4Mi"
