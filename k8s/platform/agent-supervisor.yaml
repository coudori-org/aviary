apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-supervisor
  namespace: platform
---
# RBAC: agent-supervisor needs broad permissions to manage agent namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aviary-agent-supervisor
rules:
  - apiGroups: [""]
    resources: [namespaces, configmaps, services, serviceaccounts, persistentvolumeclaims, resourcequotas, pods]
    verbs: [get, list, create, update, patch, delete]
  - apiGroups: [""]
    resources: [persistentvolumes]
    verbs: [get, list, create, update, patch, delete]
  - apiGroups: [""]
    resources: [pods/proxy, services/proxy]
    verbs: [get, create]
  - apiGroups: ["apps"]
    resources: [deployments]
    verbs: [get, list, create, update, patch, delete]
  - apiGroups: ["networking.k8s.io"]
    resources: [networkpolicies]
    verbs: [get, list, create, update, patch, delete]
  - apiGroups: ["keda.sh"]
    resources: [scaledobjects]
    verbs: [get, list, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aviary-agent-supervisor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aviary-agent-supervisor
subjects:
  - kind: ServiceAccount
    name: agent-supervisor
    namespace: platform
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-supervisor
  namespace: platform
  labels:
    aviary/service: agent-supervisor
spec:
  replicas: 1
  selector:
    matchLabels:
      aviary/service: agent-supervisor
  template:
    metadata:
      labels:
        aviary/service: agent-supervisor
    spec:
      serviceAccountName: agent-supervisor
      hostAliases:
        - ip: "${HOST_GATEWAY_IP}"
          hostnames: ["host.k8s.internal"]
      containers:
        - name: agent-supervisor
          image: aviary-agent-supervisor:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9000
              name: http
          env:
            - name: AGENT_RUNTIME_IMAGE
              value: "aviary-runtime:latest"
            - name: HOST_GATEWAY_IP
              value: "${HOST_GATEWAY_IP}"
            - name: MAX_CONCURRENT_SESSIONS_PER_POD
              value: "5"
            - name: SESSION_IDLE_THRESHOLD_SECONDS
              value: "300"
            - name: DATABASE_URL
              value: "postgresql+asyncpg://aviary:aviary@host.k8s.internal:5432/aviary"
            - name: REDIS_URL
              value: "redis://host.k8s.internal:6379/0"
            - name: INFERENCE_ROUTER_URL
              value: "http://litellm.platform.svc:4000"
            - name: MCP_GATEWAY_URL
              value: "http://mcp-gateway.platform.svc:8100"
            - name: LITELLM_API_KEY
              value: "sk-aviary-dev"
            - name: AVIARY_API_URL
              value: "http://host.k8s.internal:8000/api"
            - name: INTERNAL_API_KEY
              value: "sk-aviary-internal"
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 9000
            initialDelaySeconds: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: agent-supervisor
  namespace: platform
  labels:
    aviary/service: agent-supervisor
spec:
  type: NodePort
  selector:
    aviary/service: agent-supervisor
  ports:
    - name: http
      port: 9000
      targetPort: 9000
      nodePort: 30900
      protocol: TCP
