# KEDA PostgreSQL scaler credentials.
#
# Every per-agent ScaledObject references `aviary-postgres-auth` via
# `authenticationRef`. The scaler uses the `connection` parameter as a
# Postgres DSN to run `COUNT(*) FROM sessions WHERE agent_id=... AND status='active'`
# at its polling interval.
#
# ${HOST_GATEWAY_IP} is substituted by setup-dev.sh at apply time.

apiVersion: v1
kind: Secret
metadata:
  name: aviary-postgres-dsn
  namespace: agents
type: Opaque
stringData:
  connection: "host=${HOST_GATEWAY_IP} port=5432 user=aviary password=aviary dbname=aviary sslmode=disable"
---
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: aviary-postgres-auth
  namespace: agents
spec:
  secretTargetRef:
    - parameter: connection
      name: aviary-postgres-dsn
      key: connection
