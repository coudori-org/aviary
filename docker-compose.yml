services:
  # ── Infrastructure ──────────────────────────────────────────

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: aviary
      POSTGRES_USER: aviary
      POSTGRES_PASSWORD: aviary
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aviary"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: aviary
      KC_DB_PASSWORD: aviary
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./config/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    depends_on:
      postgres:
        condition: service_healthy

  vault:
    image: hashicorp/vault:1.17
    command: server -dev -dev-root-token-id=dev-root-token
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://127.0.0.1:8200"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://127.0.0.1:8200/v1/sys/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  vault-init:
    image: hashicorp/vault:1.17
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "dev-root-token"
    entrypoint: /bin/sh
    command: >
      -c "
        vault secrets enable -version=2 -path=secret kv 2>/dev/null || true &&
        vault kv put secret/aviary/agents/test-agent/credentials/GITHUB_TOKEN value=ghp_test_12345 &&
        vault kv put secret/aviary/agents/test-agent/credentials/SLACK_TOKEN value=xoxb-test-12345 &&
        echo 'Vault initialized with test secrets'
      "

  k8s:
    image: rancher/k3s:v1.31.4-k3s1
    command: server --disable=traefik --write-kubeconfig-mode=644 --node-name=aviary-node
    hostname: aviary-node
    privileged: true
    environment:
      K3S_TOKEN: aviary-dev-token
    ports:
      - "6443:6443"
      - "9000:30900"   # agent-supervisor NodePort
    volumes:
      - k8sdata:/var/lib/rancher/k3s
      - ./config/k3s/registries.yaml:/etc/rancher/k3s/registries.yaml

  db-migrate:
    build:
      context: ./shared
      args:
        UV_INDEX_URL: ${UV_INDEX_URL:-}
    environment:
      DATABASE_URL: postgresql+asyncpg://aviary:aviary@postgres:5432/aviary
    depends_on:
      postgres:
        condition: service_healthy

  # ── Platform MCP Servers ────────────────────────────────────

  mcp-github:
    build:
      context: ./mcp-servers
      args:
        MCP_SERVER_NAME: github
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('localhost',8000),2); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  mcp-jira:
    build:
      context: ./mcp-servers
      args:
        MCP_SERVER_NAME: jira
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('localhost',8000),2); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  mcp-confluence:
    build:
      context: ./mcp-servers
      args:
        MCP_SERVER_NAME: confluence
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('localhost',8000),2); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── Platform Services ───────────────────────────────────────

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    ports:
      - "8090:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config/litellm/config.yaml:/app/config.yaml
      - ./config/litellm/patches/fix_adapter_streaming.py:/usr/lib/python3.13/site-packages/aviary_fix_adapter_streaming.py
      - ./config/litellm/patches/aviary_user_api_key.py:/usr/lib/python3.13/site-packages/aviary_user_api_key.py
      - ./config/litellm/patches/aviary_patches.pth:/usr/lib/python3.13/site-packages/aviary_patches.pth
    environment:
      LITELLM_MASTER_KEY: "sk-aviary-dev"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      AWS_REGION: "${AWS_REGION:-ap-northeast-2}"
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "dev-root-token"
      OIDC_ISSUER: "http://localhost:8080/realms/aviary"
      OIDC_INTERNAL_ISSUER: "http://keycloak:8080/realms/aviary"
    depends_on:
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health/liveliness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Application ─────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
      args:
        UV_INDEX_URL: ${UV_INDEX_URL:-}
    ports:
      - "8000:8000"
    volumes:
      # Bind-mount source code → hot reload via uvicorn --reload
      - ./api:/workspace/api
      - ./shared:/workspace/shared
      # Anonymous volume protects container's installed packages from host's .venv
      - /workspace/.venv
    environment:
      DATABASE_URL: postgresql+asyncpg://aviary:aviary@postgres:5432/aviary
      REDIS_URL: redis://redis:6379/0
      # Public issuer (must match token's iss claim — browser URL)
      OIDC_ISSUER: http://localhost:8080/realms/aviary
      # Internal issuer (container-to-container — for fetching discovery/JWKS/token exchange)
      OIDC_INTERNAL_ISSUER: http://keycloak:8080/realms/aviary
      OIDC_CLIENT_ID: aviary-web
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
      AGENT_SUPERVISOR_URL: http://k8s:30900
      LITELLM_URL: http://litellm:4000
      LITELLM_API_KEY: "sk-aviary-dev"
      MCP_GATEWAY_URL: http://mcp-gateway:8100
      CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: ./web
      args:
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-}
    ports:
      - "3000:3000"
    volumes:
      # Bind-mount source code → hot reload via Next.js dev server
      - ./web:/app
      # Anonymous volume protects container's node_modules from host's node_modules
      - /app/node_modules
      - /app/.next
    environment:
      # NEXT_PUBLIC_* are baked into client-side JS → must use localhost (browser URLs)
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
      NEXT_PUBLIC_OIDC_ISSUER: http://localhost:8080/realms/aviary
      NEXT_PUBLIC_OIDC_CLIENT_ID: aviary-web
      # Server-side only: Next.js rewrites proxy → container-to-container
      INTERNAL_API_URL: http://api:8000
      # Ensure Next.js accepts connections from outside the container
      HOSTNAME: "0.0.0.0"
    depends_on:
      api:
        condition: service_healthy

  mcp-gateway:
    build:
      context: .
      dockerfile: mcp-gateway/Dockerfile
      args:
        UV_INDEX_URL: ${UV_INDEX_URL:-}
    ports:
      - "8100:8100"
    volumes:
      - ./mcp-gateway:/workspace/mcp-gateway
      - ./shared:/workspace/shared
      - /workspace/.venv
    environment:
      DATABASE_URL: postgresql+asyncpg://aviary:aviary@postgres:5432/aviary
      MCP_GATEWAY_PORT: "8100"
      OIDC_ISSUER: http://localhost:8080/realms/aviary
      OIDC_INTERNAL_ISSUER: http://keycloak:8080/realms/aviary
      OIDC_CLIENT_ID: aviary-web
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      vault:
        condition: service_healthy
      mcp-github:
        condition: service_healthy
      mcp-jira:
        condition: service_healthy
      mcp-confluence:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8100/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  admin:
    build:
      context: .
      dockerfile: admin/Dockerfile
      args:
        UV_INDEX_URL: ${UV_INDEX_URL:-}
    ports:
      - "8001:8001"
    volumes:
      - ./admin:/workspace/admin
      - ./shared:/workspace/shared
      - /workspace/.venv
    environment:
      DATABASE_URL: postgresql+asyncpg://aviary:aviary@postgres:5432/aviary
      AGENT_SUPERVISOR_URL: http://k8s:30900
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KEYCLOAK_REALM: aviary
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  pgdata:
  k8sdata:
