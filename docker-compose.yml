services:
  # ── Infrastructure ──────────────────────────────────────────

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: aviary
      POSTGRES_USER: aviary
      POSTGRES_PASSWORD: aviary
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aviary"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: aviary
      KC_DB_PASSWORD: aviary
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./config/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    depends_on:
      postgres:
        condition: service_healthy

  vault:
    image: hashicorp/vault:1.17
    command: server -dev -dev-root-token-id=dev-root-token
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://127.0.0.1:8200"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://127.0.0.1:8200/v1/sys/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  vault-init:
    image: hashicorp/vault:1.17
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "dev-root-token"
    entrypoint: /bin/sh
    command: >
      -c "
        vault secrets enable -version=2 -path=secret kv 2>/dev/null || true &&
        vault kv put secret/aviary/agents/test-agent/credentials/GITHUB_TOKEN value=ghp_test_12345 &&
        vault kv put secret/aviary/agents/test-agent/credentials/SLACK_TOKEN value=xoxb-test-12345 &&
        echo 'Vault initialized with test secrets'
      "

  k8s:
    image: rancher/k3s:v1.31.4-k3s1
    command: server --disable=traefik --write-kubeconfig-mode=644 --node-name=aviary-node
    hostname: aviary-node
    privileged: true
    environment:
      K3S_TOKEN: aviary-dev-token
    ports:
      - "6443:6443"
    volumes:
      - k8sdata:/var/lib/rancher/k3s
      - ./config/k3s/registries.yaml:/etc/rancher/k3s/registries.yaml

  # ── Platform Services ───────────────────────────────────────

  inference-router:
    build:
      context: ./inference-router
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload
    ports:
      - "8090:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./inference-router/app:/app/app
    environment:
      OLLAMA_URL: http://host.docker.internal:11434
      DEFAULT_MODEL_OLLAMA: qwen3.5:35b
      VLLM_URL: http://host.docker.internal:8001
      CLAUDE_API_URL: https://api.anthropic.com
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  credential-proxy:
    build:
      context: ./credential-proxy
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload
    ports:
      - "8091:8080"
    volumes:
      - ./credential-proxy/app:/app/app
    environment:
      DATABASE_URL: postgresql://aviary:aviary@postgres:5432/aviary
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
    depends_on:
      postgres:
        condition: service_healthy
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Application ─────────────────────────────────────────────

  api:
    build:
      context: ./api
    ports:
      - "8000:8000"
    volumes:
      # Bind-mount source code → hot reload via uvicorn --reload
      - ./api:/app
      # Anonymous volume protects container's installed packages from host's .venv
      - /app/.venv
      - /app/*.egg-info
    environment:
      DATABASE_URL: postgresql+asyncpg://aviary:aviary@postgres:5432/aviary
      REDIS_URL: redis://redis:6379/0
      # Public issuer (must match token's iss claim — browser URL)
      OIDC_ISSUER: http://localhost:8080/realms/aviary
      # Internal issuer (container-to-container — for fetching discovery/JWKS/token exchange)
      OIDC_INTERNAL_ISSUER: http://keycloak:8080/realms/aviary
      OIDC_CLIENT_ID: aviary-web
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
      KUBECONFIG: /app/kubeconfig.yaml
      INFERENCE_ROUTER_URL: http://inference-router:8080
      CREDENTIAL_PROXY_URL: http://credential-proxy:8080
      K8S_GATEWAY_IP: 172.18.0.1
      CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: ./web
    ports:
      - "3000:3000"
    volumes:
      # Bind-mount source code → hot reload via Next.js dev server
      - ./web:/app
      # Anonymous volume protects container's node_modules from host's node_modules
      - /app/node_modules
      - /app/.next
    environment:
      # NEXT_PUBLIC_* are baked into client-side JS → must use localhost (browser URLs)
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
      NEXT_PUBLIC_OIDC_ISSUER: http://localhost:8080/realms/aviary
      NEXT_PUBLIC_OIDC_CLIENT_ID: aviary-web
      # Server-side only: Next.js rewrites proxy → container-to-container
      INTERNAL_API_URL: http://api:8000
      # Ensure Next.js accepts connections from outside the container
      HOSTNAME: "0.0.0.0"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  k8sdata:
