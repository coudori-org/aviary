services:
  # ── Infrastructure ──────────────────────────────────────────

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: aviary
      POSTGRES_USER: aviary
      POSTGRES_PASSWORD: aviary
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aviary"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command:
      - start-dev
      - --import-realm
      - --hostname=http://localhost:8080
      - --hostname-backchannel-dynamic=true
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: aviary
      KC_DB_PASSWORD: aviary
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./config/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Probe the realm's OIDC discovery endpoint — this is exactly what
      # downstream services hit on startup to bootstrap their JWKS, so it's
      # the most accurate "ready" signal. Keycloak image has no curl/wget,
      # so we use bash's /dev/tcp + a hand-rolled HTTP/1.1 GET, then
      # confirm the response is 200 OK.
      test:
        - "CMD-SHELL"
        - |
          exec 3<>/dev/tcp/127.0.0.1/8080 || exit 1
          printf 'GET /realms/aviary/.well-known/openid-configuration HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3
          IFS= read -r line <&3
          exec 3<&-
          [[ "$$line" == *"200"* ]]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  vault:
    image: hashicorp/vault:1.17
    # Bypass the image's docker-entrypoint.sh — it auto-injects dev-mode flags
    # when invoked with `server`, which collide with our HCL listener block.
    entrypoint: ["vault"]
    command: ["server", "-config=/vault/config/vault.hcl"]
    environment:
      VAULT_ADDR: "http://127.0.0.1:8200"
      SKIP_SETCAP: "true"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    volumes:
      - vaultdata:/vault/data
      - ./config/vault/vault.hcl:/vault/config/vault.hcl:ro
    healthcheck:
      # Accept sealed/uninitialized as healthy so vault-init can run.
      test: ["CMD-SHELL", "wget --spider --quiet 'http://127.0.0.1:8200/v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  vault-init:
    image: hashicorp/vault:1.17
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: "http://vault:8200"
    volumes:
      - vaultdata:/vault/data
      - ./scripts/vault-init.sh:/usr/local/bin/vault-init.sh:ro
    entrypoint: /bin/sh
    command: ["/usr/local/bin/vault-init.sh"]

  k8s:
    image: rancher/k3s:v1.31.4-k3s1
    command: server --disable=traefik --write-kubeconfig-mode=644 --node-name=aviary-node
    hostname: aviary-node
    privileged: true
    environment:
      K3S_TOKEN: aviary-dev-token
    ports:
      - "6443:6443"
      - "30300:30300"   # aviary-env-default NodePort (supervisor → runtime)
    volumes:
      - k8sdata:/var/lib/rancher/k3s
      - ./config/k3s/registries.yaml:/etc/rancher/k3s/registries.yaml

  supervisor:
    build:
      context: .
      dockerfile: agent-supervisor/Dockerfile
      args:
        UV_INDEX_URL: ${UV_INDEX_URL:-}
    ports:
      - "9000:9000"
    volumes:
      - ./agent-supervisor:/workspace/agent-supervisor
      - /workspace/.venv
    environment:
      REDIS_URL: redis://redis:6379/0
      # Runtime env endpoint used when agent.runtime_endpoint is NULL.
      # Points at k3s NodePort for aviary-env-default.
      SUPERVISOR_DEFAULT_RUNTIME_ENDPOINT: http://k8s:30300
      METRICS_ENABLED: "true"
      # OIDC — supervisor validates the caller's user JWT (Bearer) on
      # /publish and /a2a before looking up Vault credentials.
      OIDC_ISSUER: http://localhost:8080/realms/aviary
      OIDC_INTERNAL_ISSUER: http://keycloak:8080/realms/aviary
      # Vault — per-user GitHub token lookup keyed by the JWT's `sub`.
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
      # Shared secret authenticating the workflow worker. Keep in sync with
      # the `workflow-worker` service.
      WORKER_SHARED_SECRET: ${WORKER_SHARED_SECRET:-dev-worker-secret-change-me}
    depends_on:
      redis:
        condition: service_healthy
      vault:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  db-migrate:
    build:
      context: ./shared
      args:
        UV_INDEX_URL: ${UV_INDEX_URL:-}
    environment:
      DATABASE_URL: postgresql+asyncpg://aviary:aviary@postgres:5432/aviary
    depends_on:
      postgres:
        condition: service_healthy

  # Temporal server hosts workflow execution state. auto-setup applies its
  # own schema migrations to the temporal + temporal_visibility databases on
  # first boot and registers the `default` namespace.
  temporal:
    image: temporalio/auto-setup:1.25
    ports:
      - "7233:7233"
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: aviary
      POSTGRES_PWD: aviary
      POSTGRES_SEEDS: postgres
      DBNAME: temporal
      VISIBILITY_DBNAME: temporal_visibility
      # Default namespace is auto-created; SKIP_DEFAULT_NAMESPACE_CREATION=false is default.
      DEFAULT_NAMESPACE: default
      DEFAULT_NAMESPACE_RETENTION: 7d
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # The frontend binds to the container IP, not 127.0.0.1, so we address
      # it by hostname. `temporal` CLI (not `tctl`) returns the correct exit
      # code on failure; we also grep for SERVING to double-check the output.
      test: ["CMD-SHELL", "temporal --address $(hostname):7233 operator cluster health | grep -q SERVING"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  temporal-ui:
    image: temporalio/ui:2.30.1
    ports:
      - "8233:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    depends_on:
      temporal:
        condition: service_healthy

  # Long-running Temporal worker. Hosts the WorkflowRun workflow and all
  # node activities (agent_step, template, condition, …). Scales
  # independently of api/admin.
  workflow-worker:
    build:
      context: .
      dockerfile: workflow-worker/Dockerfile
      args:
        UV_INDEX_URL: ${UV_INDEX_URL:-}
    volumes:
      - ./workflow-worker:/workspace/workflow-worker
      - ./shared:/workspace/shared
      - /workspace/.venv
    environment:
      TEMPORAL_HOST: temporal:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: aviary-workflows
      DATABASE_URL: postgresql+asyncpg://aviary:aviary@postgres:5432/aviary
      REDIS_URL: redis://redis:6379/0
      SUPERVISOR_URL: http://supervisor:9000
      WORKER_SHARED_SECRET: ${WORKER_SHARED_SECRET:-dev-worker-secret-change-me}
    depends_on:
      temporal:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  # ── Platform MCP Servers ────────────────────────────────────

  mcp-jira:
    build:
      context: ./mcp-servers
      args:
        MCP_SERVER_NAME: jira
    environment:
      JIRA_BASE_URL: ${JIRA_BASE_URL:-https://your-corp.atlassian.net}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('localhost',8000),2); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  mcp-confluence:
    build:
      context: ./mcp-servers
      args:
        MCP_SERVER_NAME: confluence
    environment:
      CONFLUENCE_BASE_URL: ${CONFLUENCE_BASE_URL:-https://your-corp.atlassian.net}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('localhost',8000),2); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── Platform Services ───────────────────────────────────────

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    ports:
      - "8090:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # `LITELLM_SITE_PACKAGES` pins where to mount the .pth patches into the
    # image's Python site-packages dir. Override in `.env` whenever the
    # upstream LiteLLM image bumps its Python version.
    volumes:
      - ./config/litellm/config.yaml:/app/config.yaml
      - ./config/litellm/patches/aviary_jwt_util.py:${LITELLM_SITE_PACKAGES:-/usr/lib/python3.13/site-packages}/aviary_jwt_util.py
      - ./config/litellm/patches/aviary_vault_util.py:${LITELLM_SITE_PACKAGES:-/usr/lib/python3.13/site-packages}/aviary_vault_util.py
      - ./config/litellm/patches/aviary_user_api_key.py:${LITELLM_SITE_PACKAGES:-/usr/lib/python3.13/site-packages}/aviary_user_api_key.py
      - ./config/litellm/patches/aviary_mcp_credentials.py:${LITELLM_SITE_PACKAGES:-/usr/lib/python3.13/site-packages}/aviary_mcp_credentials.py
      - ./config/litellm/patches/aviary_patches.pth:${LITELLM_SITE_PACKAGES:-/usr/lib/python3.13/site-packages}/aviary_patches.pth
      - ./config/litellm/mcp-secret-injection.yaml:/app/aviary-mcp-secret-injection.yaml:ro
    environment:
      LITELLM_MASTER_KEY: "sk-aviary-dev"
      # DB-backed UI: keys, teams, spend in Postgres. Models stay file-based
      # (config.yaml) so we get a single source of truth and no UI-added
      # shadow entries in /v1/model/info.
      DATABASE_URL: "postgresql://aviary:aviary@postgres:5432/litellm"
      UI_USERNAME: "${LITELLM_UI_USERNAME:-admin}"
      UI_PASSWORD: "${LITELLM_UI_PASSWORD:-admin}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      AWS_REGION: "${AWS_REGION:-ap-northeast-2}"
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "dev-root-token"
      OIDC_ISSUER: "http://localhost:8080/realms/aviary"
      OIDC_INTERNAL_ISSUER: "http://keycloak:8080/realms/aviary"
      # Keep Aviary's `{server}__{tool}` naming so frontend bindings stay stable.
      MCP_TOOL_PREFIX_SEPARATOR: "__"
      AVIARY_MCP_INJECTION_CONFIG: "/app/aviary-mcp-secret-injection.yaml"
    depends_on:
      postgres:
        condition: service_healthy
      vault:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      mcp-jira:
        condition: service_healthy
      mcp-confluence:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health/liveliness',timeout=3).status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  prometheus:
    image: prom/prometheus:v3.0.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus

  # ── Application ─────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
      args:
        UV_INDEX_URL: ${UV_INDEX_URL:-}
    ports:
      - "8000:8000"
    volumes:
      # Bind-mount source code → hot reload via uvicorn --reload
      - ./api:/workspace/api
      - ./shared:/workspace/shared
      # Anonymous volume protects container's installed packages from host's .venv
      - /workspace/.venv
    environment:
      ENV: ${ENV:-development}
      DATABASE_URL: postgresql+asyncpg://aviary:aviary@postgres:5432/aviary
      REDIS_URL: redis://redis:6379/0
      # Public issuer (must match token's iss claim — browser URL)
      OIDC_ISSUER: http://localhost:8080/realms/aviary
      # Internal issuer (container-to-container — for fetching discovery/JWKS/token exchange)
      OIDC_INTERNAL_ISSUER: http://keycloak:8080/realms/aviary
      OIDC_CLIENT_ID: aviary-web
      AGENT_SUPERVISOR_URL: http://supervisor:9000
      LITELLM_URL: http://litellm:4000
      LITELLM_API_KEY: "sk-aviary-dev"
      INTERNAL_API_KEY: sk-aviary-internal
      CORS_ORIGINS: '["http://localhost:3000"]'
      TEMPORAL_HOST: temporal:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: aviary-workflows
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      temporal:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: ./web
      args:
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-}
    ports:
      - "3000:3000"
    volumes:
      # Bind-mount source code → hot reload via Next.js dev server
      - ./web:/app
      # Anonymous volume protects container's node_modules from host's node_modules
      - /app/node_modules
      - /app/.next
    environment:
      # NEXT_PUBLIC_* are baked into client-side JS → must use localhost (browser URLs)
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
      NEXT_PUBLIC_OIDC_ISSUER: http://localhost:8080/realms/aviary
      NEXT_PUBLIC_OIDC_CLIENT_ID: aviary-web
      # Server-side only: Next.js rewrites proxy → container-to-container
      INTERNAL_API_URL: http://api:8000
      # Ensure Next.js accepts connections from outside the container
      HOSTNAME: "0.0.0.0"
    depends_on:
      api:
        condition: service_healthy

  admin:
    build:
      context: .
      dockerfile: admin/Dockerfile
      args:
        UV_INDEX_URL: ${UV_INDEX_URL:-}
    ports:
      - "8001:8001"
    volumes:
      - ./admin:/workspace/admin
      - ./shared:/workspace/shared
      - /workspace/.venv
    environment:
      DATABASE_URL: postgresql+asyncpg://aviary:aviary@postgres:5432/aviary
      AGENT_SUPERVISOR_URL: http://supervisor:9000
      LITELLM_URL: http://litellm:4000
      LITELLM_API_KEY: "sk-aviary-dev"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KEYCLOAK_REALM: aviary
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      vault:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  pgdata:
  k8sdata:
  vaultdata:
  prometheusdata:
  grafanadata:
